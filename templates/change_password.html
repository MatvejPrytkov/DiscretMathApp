{% extends 'base.html' %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<style>
    .form-actions {
        margin-top: 28px;
        display: flex;
        gap: 12px;
    }
    .form-actions button,
    .form-actions a {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        box-sizing: border-box;
        border: none;
        min-height: 48px;
    }
    .btn-success {
        background: #28a745;
        color: white;
    }
    .btn-danger {
        background: #dc3545;
        color: white;
    }
    .btn-success:hover {
        background: #218838;
        transform: translateY(-2px);
    }
    .btn-danger:hover {
        background: #c82333;
        transform: translateY(-2px);
    }
</style>
<div class="card">
    <h1>Смена пароля</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="btn-success">Изменить пароль</button>
            <a href="
                {% if user.profile.role == 'teacher' %}
                    {% url 'teacher_dashboard' %}
                {% else %}
                    {% url 'profile' %}
                {% endif %}
            " class="btn-danger">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
