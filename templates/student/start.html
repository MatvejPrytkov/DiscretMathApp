{% extends 'student/base_student.html' %}
{% load test_extras %}  <!-- ИСПРАВЛЕНО: добавлена загрузка фильтров -->
{% block title %}Входное тестирование{% endblock %}
{% block student_content %}
    <h1>Входное тестирование (15 вопросов)</h1>
    <form method="post">
        {% csrf_token %}

        {% for q in questions %}
            <div class="question-block">
                <h3>
                    <span class="question-number">{{ forloop.counter }}</span>
                    {{ q.question }}
                </h3>

                <!-- Скрытое поле с ID вопроса -->
                <input type="hidden" name="question_id_{{ q.category }}_{{ q.id_val }}" value="{{ q.id_val }}">

                <div class="options">
                    <label>
                        <input type="radio" name="q_{{ q.category }}_{{ q.id_val }}" value="a" required>
                        А) {{ q.answer1 }}  <!-- ИСПРАВЛЕНО: А вместо A -->
                    </label>
                    <label>
                        <input type="radio" name="q_{{ q.category }}_{{ q.id_val }}" value="b">
                        Б) {{ q.answer2 }}  <!-- ИСПРАВЛЕНО: Б вместо Б -->
                    </label>
                    <label>
                        <input type="radio" name="q_{{ q.category }}_{{ q.id_val }}" value="c">
                        В) {{ q.answer3 }}  <!-- ИСПРАВЛЕНО: В вместо C -->
                    </label>
                    <label>
                        <input type="radio" name="q_{{ q.category }}_{{ q.id_val }}" value="d">
                        Г) {{ q.answer4 }}  <!-- ИСПРАВЛЕНО: Г вместо D -->
                    </label>
                </div>
            </div>
        {% endfor %}

        <div style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary btn-lg" style="padding: 12px 30px;">
                Отправить ответы
            </button>
        </div>
    </form>
{% endblock %}
