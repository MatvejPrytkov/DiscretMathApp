{% extends 'base.html' %}

{% block extra_css %}
{{ block.super }}
<style>
    .teacher-layout {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .teacher-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 16px 20px;
        background: #ffffff;
        border: 1px solid #dee2e6;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .teacher-nav-link {
        display: inline-block;
        padding: 10px 16px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        text-decoration: none;
        color: #212529;
        background-color: #f8f9fa;
        transition: all 0.2s ease;
        font-weight: 500;
    }

    .teacher-nav-link:hover {
        background-color: #e9ecef;
        color: #000;
    }

    .teacher-nav-link.active {
        background-color: #0d6efd;
        color: #fff;
        border-color: #0d6efd;
    }

    .teacher-content {
        width: 100%;
    }

    @media (max-width: 768px) {
        .teacher-nav {
            flex-direction: column;
        }

        .teacher-nav-link {
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="teacher-layout">
    <nav class="teacher-nav" aria-label="Навигация преподавателя">
        <a href="{% url 'teacher_dashboard' %}"
           class="teacher-nav-link {% if request.resolver_match.url_name == 'teacher_dashboard' %}active{% endif %}">
            Панель управления
        </a>

        <a href="{% url 'teacher_manage_tests' %}"
           class="teacher-nav-link {% if request.resolver_match.url_name == 'teacher_manage_tests' %}active{% endif %}">
            Мои тесты
        </a>

        <a href="{% url 'teacher_labs' %}"
           class="teacher-nav-link {% if request.resolver_match.url_name == 'teacher_labs' %}active{% endif %}">
            Лабораторные
        </a>

        <a href="{% url 'student_results' %}"
           class="teacher-nav-link {% if request.resolver_match.url_name == 'student_results' %}active{% endif %}">
            Результаты учеников
        </a>
    </nav>

    <div class="teacher-content">
        {% block teacher_content %}{% endblock %}
    </div>
</div>
{% endblock %}
