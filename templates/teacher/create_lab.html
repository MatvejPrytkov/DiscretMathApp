{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>Создание лабораторной работы</h1>
        <p class="page-subtitle">Заполните поля для новой лабораторной</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label for="id_title">Название лабораторной работы *</label>
                    <input
                        type="text"
                        id="id_title"
                        name="title"
                        class="form-control"
                        placeholder="Например, «Анализ графов»"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="id_description">Описание *</label>
                    <textarea
                        id="id_description"
                        name="description"
                        class="form-control"
                        rows="4"
                        placeholder="Подробное описание задания, цели, требования..."
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="id_theme">Тема *</label>
                    <input
                        type="text"
                        id="id_theme"
                        name="theme"
                        class="form-control"
                        placeholder="Например, «Теория графов»"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="id_difficulty">Сложность</label>
                    <select id="id_difficulty" name="difficulty" class="form-control">
                        <option value="easy">Легкая</option>
                        <option value="medium" selected>Средняя</option>
                        <option value="hard">Сложная</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="id_docx_file">Файл с заданием (.docx) *</label>
                    <input
                        type="file"
                        id="id_docx_file"
                        name="docx_file"
                        class="form-control"
                        accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                        required
                    >
                    <small class="help-text">Загрузите файл формата .docx</small>
                </div>
                <div class="form-group">
    <label for="id_pptx_file">Презентация (.pptx) (необязательно)</label>
    <input
        type="file"
        id="id_pptx_file"
        name="pptx_file"
        class="form-control"
        accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation"
    >
    <small class="help-text">Загрузите файл формата .pptx (презентация)</small>
</div>

                <div class="action-buttons">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <a href="{% url 'teacher_labs' %}" class="btn">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const first = document.getElementById('id_title');
    if (first) first.focus();

    const fileInput = document.getElementById('id_docx_file');
    if (fileInput) {
        fileInput.addEventListener('change', function () {
            const file = this.files && this.files[0] ? this.files[0] : null;
            const old = document.getElementById('selected-file-name');
            if (old) old.remove();

            if (file) {
                const info = document.createElement('div');
                info.id = 'selected-file-name';
                info.className = 'help-text';
                info.style.marginTop = '6px';
                info.textContent = 'Выбран файл: ' + file.name;
                this.parentNode.appendChild(info);
            }
        }
    const pptxInput = document.getElementById('id_pptx_file');
if (pptxInput) {
    pptxInput.addEventListener('change', function () {
        const file = this.files && this.files[0] ? this.files[0] : null;
        const old = document.getElementById('selected-pptx-file-name');
        if (old) old.remove();

        if (file) {
            const info = document.createElement('div');
            info.id = 'selected-pptx-file-name';
            info.className = 'help-text';
            info.style.marginTop = '6px';
            info.textContent = 'Выбран файл: ' + file.name;
            this.parentNode.appendChild(info);
        }
    });
}

        );
    }
});
</script>
{% endblock %}
