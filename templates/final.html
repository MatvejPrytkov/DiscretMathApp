<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Итоговое тестирование</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        {% for q in questions %}
            <div class="question-block">
                <p>{{ q.question }}</p>
                <input type="hidden" name="question_ids" value="{{ q.id }}">

                <label><input type="radio" name="q_{{ q.id }}" value="a"> {{ q.answer1 }}</label><br>
                <label><input type="radio" name="q_{{ q.id }}" value="b"> {{ q.answer2 }}</label><br>
                <label><input type="radio" name="q_{{ q.id }}" value="c"> {{ q.answer3 }}</label><br>
                <label><input type="radio" name="q_{{ q.id }}" value="d"> {{ q.answer4 }}</label>
            </div>
            <hr>
        {% endfor %}
        <button type="submit" class="btn">Завершить тест</button>
    </form>
</body>
</html>
